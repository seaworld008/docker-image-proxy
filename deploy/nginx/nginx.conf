events {
  worker_connections 4096;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  limit_req_zone $binary_remote_addr zone=manifest_rate:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

  upstream registry_backend {
    server registry:5000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 0;
    proxy_http_version 1.1;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_connect_timeout 30s;
    proxy_request_buffering off;
    proxy_buffering off;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location = / {
      return 200 "docker-image-proxy\n";
    }

    location ~ ^/v2/.+/manifests/ {
      if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
      }

      limit_req zone=manifest_rate burst=40 nodelay;
      limit_conn addr_conn 50;

      proxy_pass http://registry_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v2/ {
      if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
      }

      proxy_pass http://registry_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Range $http_range;
      proxy_set_header If-Range $http_if_range;
    }
  }
}
